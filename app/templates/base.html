<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.page_title }}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
    <link rel="manifest" href="{{ request.url_for('static', path='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ request.url_for('static', path='apple-touch-icon.png') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TT Reg">
</head>
<body>
    <div class="language-switcher">
        <span>{{ t.language }}:</span>
        <a href="{{ request.url_for('home') }}?lang=en" class="{% if lang == 'en' %}active{% endif %}">{{ t.english }}</a>
        <a href="{{ request.url_for('home') }}?lang=ru" class="{% if lang == 'ru' %}active{% endif %}">{{ t.russian }}</a>
    </div>
    <div class="form-container">
        <h1>{{ t.registration_header }}</h1>
        {{ message | safe }}
        <form method="post" action="{{ request.url_for('register') }}?lang={{ lang }}">
            <div class="form-group">
                <label for="username">{{ t.username_label }}</label>
                <input type="text" id="username" name="username" required 
                       placeholder="{{ t.username_placeholder }}">
            </div>
            <div class="form-group">
                <label for="password">{{ t.password_label }}</label>
                <input type="password" id="password" name="password" required 
                       placeholder="{{ t.password_placeholder }}">
            </div>
            <button type="submit">{{ t.register_button }}</button>
        </form>
    </div>
</body>
</html>
