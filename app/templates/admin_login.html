<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.admin_title }}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body>
    <div class="language-switcher">
        <span>{{ t.language }}:</span>
        <a href="{{ request.url_for('admin_home') }}?lang=en" class="{% if lang == 'en' %}active{% endif %}">{{ t.english }}</a>
        <a href="{{ request.url_for('admin_home') }}?lang=ru" class="{% if lang == 'ru' %}active{% endif %}">{{ t.russian }}</a>
    </div>
    <div class="form-container">
        <h1>{{ t.admin_login_header }}</h1>
        {% if error %}
        <div class="message error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ request.url_for('admin_login') }}?lang={{ lang }}">
            <div class="form-group">
                <label for="username">{{ t.username_label }}</label>
                <input type="text" id="username" name="username" required 
                       placeholder="{{ t.username_placeholder }}">
            </div>
            <div class="form-group">
                <label for="password">{{ t.password_label }}</label>
                <input type="password" id="password" name="password" required 
                       placeholder="{{ t.password_placeholder }}">
            </div>
            <button type="submit">{{ t.admin_login_button }}</button>
        </form>
        <div class="back-link">
            <a href="{{ request.url_for('home') }}?lang={{ lang }}">{{ t.admin_back_to_registration }}</a>
        </div>
    </div>
</body>
</html>
